<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on today</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1 class="heading">Focus on <span>Today</span></h1>
    <div class="container">
        <h1>Today</h1>
        <p class="goal">Raise the bar by completing your goals!</p>
        <div class="progress-container">
            <div class="progress-value">
                <p></p>
            </div>
        </div>
        <div class="about-set-goal">
            <p>Please set all the 3 goals!</p>
        </div>
        <div class="task-container">
            <div class="task" style="margin-top: 0px;">
                <div class="circle">
                    <svg width="13" height="9" viewBox="0 0 13 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M1.00006 4.11113L3.20105 7.12636C3.54487 7.59738 4.21715 7.67548 4.65979 7.29582L12.0001 1.00002"
                            stroke="#F7F7F7" stroke-width="2" stroke-linecap="round" />
                    </svg>

                </div>
                <input type="text" class="input" placeholder="Add new goal...">
            </div>

            <div class="task">
                <div class="circle">
                    <svg width="13" height="9" viewBox="0 0 13 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M1.00006 4.11113L3.20105 7.12636C3.54487 7.59738 4.21715 7.67548 4.65979 7.29582L12.0001 1.00002"
                            stroke="#F7F7F7" stroke-width="2" stroke-linecap="round" />
                    </svg>

                </div>
                <input type="text" class="input " placeholder="Add new goal...">
            </div>
            <div class="task">
                <div class="circle">
                    <svg width="13" height="9" viewBox="0 0 13 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M1.00006 4.11113L3.20105 7.12636C3.54487 7.59738 4.21715 7.67548 4.65979 7.29582L12.0001 1.00002"
                            stroke="#F7F7F7" stroke-width="2" stroke-linecap="round" />
                    </svg>

                </div>
                <input type="text" class="input" placeholder="Add new goal...">
            </div>
        </div>
        <p class="bottom">“Move one step ahead, today!”</p>
        <p class="made-by">Copyright © 2026 All rights reserved || sujit kushwaha❤️</p>
</body>

</html>
